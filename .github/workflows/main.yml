name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install

    - name: Lint
      run: node ./node_modules/eslint/bin/eslint.js 

    - name: Run test
      run: node ./node_modules/jest/bin/jest.js

    - name: Build
      run: npm run build || true